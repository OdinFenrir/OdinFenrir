name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: OdinFenrir
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#a100a8&color_dots=#0b0f0b,#0d1a12,#10301f,#145f33,#28e36a
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#a100a8&color_dots=#0b0f0b,#0d1a12,#10301f,#145f33,#28e36a

      - name: Publish snake assets
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
